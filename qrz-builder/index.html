<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRZ Page Builder – Login</title>
    <link rel="stylesheet" href="css/app.css?v=20260428-1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- sql.js WASM – must be loaded before ES modules -->
    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.12.0/dist/sql-wasm.js"></script>
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-broadcast-tower"></i></div>
        <h1>QRZ Page Builder</h1>
        <p class="subtitle">Create &amp; manage your QRZ.com bio page</p>

        <!-- Tabs -->
        <div class="auth-tabs" role="tablist">
            <button class="auth-tab active" id="tab-login"    role="tab" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button class="auth-tab"        id="tab-register" role="tab" onclick="switchTab('register')">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </div>

        <!-- Login panel -->
        <div class="auth-panel active" id="panel-login">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Your username"
                       autocomplete="username"
                       onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Your password"
                       autocomplete="current-password"
                       onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <button class="btn btn-primary btn-wide" id="btn-login" onclick="doLogin()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <p class="feedback error" id="login-feedback"></p>
        </div>

        <!-- Register panel -->
        <div class="auth-panel" id="panel-register">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username (min 3 chars)"
                       autocomplete="username"
                       onkeydown="if(event.key==='Enter') doRegister()">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Choose a password (min 6 chars)"
                       autocomplete="new-password"
                       onkeydown="if(event.key==='Enter') doRegister()">
            </div>
            <div class="form-group">
                <label for="reg-confirm">Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Repeat password"
                       autocomplete="new-password"
                       onkeydown="if(event.key==='Enter') doRegister()">
            </div>
            <button class="btn btn-primary btn-wide" id="btn-register" onclick="doRegister()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
            <p class="feedback" id="reg-feedback"></p>
        </div>
    </div>
</div>

<script type="module">
import { initDb }      from './js/db.js?v=20260428-1';
import { login, register, getSession } from './js/auth.js?v=20260428-1';

// Auto-redirect if already logged in
if (getSession()) {
    window.location.href = 'builder.html';
}

// Init DB on load
let dbReady = false;
initDb()
    .then(() => { dbReady = true; })
    .catch(err => {
        document.getElementById('login-feedback').textContent =
            'DB init failed: ' + err.message;
    });

// ── Tab switching ──────────────────────────────────────────
window.switchTab = function(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('login-feedback').textContent = '';
    document.getElementById('reg-feedback').textContent   = '';
};

// ── Login ──────────────────────────────────────────────────
window.doLogin = async function() {
    if (!dbReady) return;
    const btn  = document.getElementById('btn-login');
    const fb   = document.getElementById('login-feedback');
    const user = document.getElementById('login-username').value;
    const pass = document.getElementById('login-password').value;

    if (!user || !pass) { fb.textContent = 'Please fill in all fields.'; fb.className = 'feedback error'; return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in…';

    const result = await login(user, pass);

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';

    if (result.ok) {
        window.location.href = 'builder.html';
    } else {
        fb.textContent = result.error;
        fb.className   = 'feedback error';
    }
};

// ── Register ───────────────────────────────────────────────
window.doRegister = async function() {
    if (!dbReady) return;
    const btn     = document.getElementById('btn-register');
    const fb      = document.getElementById('reg-feedback');
    const user    = document.getElementById('reg-username').value;
    const pass    = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;

    if (!user || !pass || !confirm) {
        fb.textContent = 'Please fill in all fields.';
        fb.className   = 'feedback error';
        return;
    }
    if (pass !== confirm) {
        fb.textContent = 'Passwords do not match.';
        fb.className   = 'feedback error';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating…';

    const result = await register(user, pass);

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';

    if (result.ok) {
        fb.textContent = 'Account created! You can now log in.';
        fb.className   = 'feedback success';
        // Switch to login tab after short delay
        setTimeout(() => {
            document.getElementById('login-username').value = user;
            switchTab('login');
        }, 1200);
    } else {
        fb.textContent = result.error;
        fb.className   = 'feedback error';
    }
};
</script>

</body>
</html>
