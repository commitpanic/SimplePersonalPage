name: QRZ QSO Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install parser
        run: npm install --no-save fast-xml-parser@4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.QRZ_API_KEY }}" ]; then
            echo "::error::Missing repository secret QRZ_API_KEY. Add it in Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

      - name: Fetch and transform QRZ XML
        env:
          QRZ_API_KEY: ${{ secrets.QRZ_API_KEY }}
          QRZ_FETCH_OPTIONS: MAX:500,TYPE:ADIF
          QRZ_API_ENDPOINT: https://logbook.qrz.com/api
          QRZ_AGENT: SP3FCK-HamMap/1.0
          HOME_LOCATOR: JO72SG
        run: node scripts/qrz-sync.mjs

      - name: Commit changes
        run: |
          if git diff --quiet --exit-code data/qso.latest.json; then
            echo "No changes in qso.latest.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/qso.latest.json
          git commit -m "chore: update QSO data"
          git push
